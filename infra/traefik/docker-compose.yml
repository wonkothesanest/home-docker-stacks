services:
  traefik:
    image: traefik:v3.6
    container_name: traefik
    restart: unless-stopped

    command:
      # Entry Points
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.bolt.address=:7687"

      # Docker Provider (for local orangepi5b containers)
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"

      # File Provider (for wonko.local services)
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
      - "--providers.file.watch=true"
      
      # Tailscale certificate resolver
      - "--certificatesresolvers.tailscale.tailscale=true"

      # Every container becomes <container-name>.<your-domain>
      - "--providers.docker.defaultrule=Host(`{{ index .Labels \"com.docker.compose.service\" }}.${DOMAIN}`)"
      - "--providers.docker.network=traefik-network"

      # API/Dashboard
      - "--api.dashboard=true"
      - "--api.insecure=true"  # Only for dev; use auth middleware for production

      # Logging
      - "--log.level=DEBUG"
      - "--accesslog=true"                   # Enable access log
      - "--accesslog.bufferingsize=0"        # Flush on every line (no buffering)
      - "--accesslog.format=json"            # Easier to grep/jq
      - "--accesslog.fields.defaultmode=keep"
      - "--accesslog.fields.headers.defaultmode=keep"


    ports:
      - "80:80"       # HTTP entry point
      - "443:443"     # HTTPS entry point
      - "9080:8080"   # Dashboard (9080 on host to avoid conflict, 8080 internal)
      - "7687:7687"   # bolt protocol

    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"  # Docker API access for local containers
      - "/home/node/home-docker-stacks/infra/traefik/config/dynamic.yml:/etc/traefik/dynamic.yml:ro"  # File provider dynamic config
      - "/home/node/home-docker-stacks/infra/traefik/config/openclaw.yml:/etc/traefik/openclaw.yml:ro"  # File provider openclaw config
      - "/var/run/tailscale/tailscaled.sock:/var/run/tailscale/tailscaled.sock"
    networks:
      - traefik-network

    extra_hosts:
      - "wonko.local:192.168.50.41"
      - "wonko:192.168.50.41"
      - "ford.local:192.168.50.44"
      - "ford:192.168.50.44"
      - "pi.hole:192.168.50.40"

    labels:
      # Enable Traefik for its own dashboard
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.${DOMAIN}`)"
      - "traefik.http.routers.dashboard.entrypoints=web"
      - "traefik.http.routers.dashboard.service=api@internal"

networks:
  traefik-network:
    name: traefik-network
    driver: bridge
