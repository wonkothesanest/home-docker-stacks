services:
  mission-control:
    user: "1001:1001"
    image: ghcr.io/builderz-labs/mission-control:latest
    container_name: mission-control
    ports:
      - "${MC_PORT:-3000}:${PORT:-3000}"
    env_file:
      - path: .env
    environment:
      - PORT=${PORT:-3000}
      - OPENCLAW_GATEWAY_HOST=${OPENCLAW_GATEWAY_HOST:-host.docker.internal}
      - OPENCLAW_GATEWAY_PORT=${OPENCLAW_GATEWAY_PORT:-18789}
      - NEXT_PUBLIC_GATEWAY_URL=${NEXT_PUBLIC_GATEWAY_URL}
    volumes:
      - mission-control-data:/app/.data
      - /home/dusty/.openclaw:/run/openclaw:rw
    extra_hosts:
      - "host.docker.internal:host-gateway"
    read_only: true
    tmpfs:
      - /tmp
      - /app/.next/cache
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    networks:
      - mission-control

  mission-control-tailscale:
    image: tailscale/tailscale:stable
    container_name: mission-control-tailscale
    depends_on:
      - mission-control
    network_mode: service:mission-control
    restart: unless-stopped
    env_file:
      - path: ../../infra/tailscale/.env
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_HOSTNAME=mission-control
      - TS_AUTH_ONCE=true
      - TS_USERSPACE=true
      - TS_EXTRA_ARGS=--accept-dns
    volumes:
      - ./tailscale-state:/var/lib/tailscale

volumes:
  mission-control-data:

networks:
  mission-control:
    driver: bridge
